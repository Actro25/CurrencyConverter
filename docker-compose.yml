services:
  currency-webui:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    ports:
        - "8000:5171"
    volumes:
        - ./src/WebUI:/app/WebUI
    profiles:
        - web
    working_dir: /app/WebUI
    command: dotnet run
    environment:
        - ASPNETCORE_ENVIRONMENT=Development
        - ASPNETCORE_HTTP_PORTS=5171